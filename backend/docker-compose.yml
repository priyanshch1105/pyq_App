services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pyq_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2005
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
