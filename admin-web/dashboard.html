<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PYQ Platform - Admin Dashboard</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="dashboard">
        <div class="dashboard-header">
          <div>
            <h1>Admin Command Center</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">
              Monitor platform health, publish broadcasts, and add fresh questions.
            </p>
          </div>
          <button id="logoutBtn" class="btn btn-danger">Log Out Session</button>
        </div>

        <div class="stats-grid">
          <div class="glass-panel stat-card">
            <span class="stat-label">Total Registered Users</span>
            <span class="stat-value text-blue" id="stat-total-users">-</span>
          </div>
          <div class="glass-panel stat-card">
            <span class="stat-label">Premium Subscribers</span>
            <span class="stat-value text-purple" id="stat-premium-users">-</span>
          </div>
          <div class="glass-panel stat-card">
            <span class="stat-label">Questions in Databank</span>
            <span class="stat-value text-green" id="stat-total-questions">-</span>
          </div>
        </div>

        <div class="content-grid">
          <div class="glass-panel">
            <h2 class="section-title">Broadcast Notification</h2>
            <form id="announcementForm">
              <div class="form-group">
                <label>Notification Title</label>
                <input
                  type="text"
                  id="announceTitle"
                  class="form-control"
                  required
                  placeholder="Major UI update released"
                />
              </div>

              <div class="form-group">
                <label>Message Content</label>
                <textarea
                  id="announceContent"
                  class="form-control"
                  required
                  placeholder="Explain the release, benefits, or notice..."
                ></textarea>
              </div>

              <div class="switch-wrapper">
                <input type="checkbox" id="announcePremium" />
                <label for="announcePremium" style="color: var(--warning);">
                  Target Premium Subscribers Only
                </label>
              </div>

              <button
                type="submit"
                class="btn"
                id="announceBtn"
                style="background: linear-gradient(to right, #c084fc, #818cf8);"
              >
                Dispatch Broadcast
              </button>
            </form>

            <div class="panel-divider"></div>

            <div class="panel-header-row">
              <h3 class="subsection-title">Recent Broadcasts</h3>
              <button type="button" class="btn btn-secondary" id="refreshAnnouncementsBtn">
                Refresh
              </button>
            </div>

            <div id="announcementHistory" class="list-stack">
              <div class="empty-state">No announcements loaded yet.</div>
            </div>
          </div>

          <div class="glass-panel">
            <h2 class="section-title">Upload New Question</h2>
            <form id="questionForm">
              <div class="two-col">
                <div class="form-group">
                  <label>Exam Identifier</label>
                  <input
                    type="text"
                    id="qExam"
                    class="form-control"
                    placeholder="JEE_MAIN"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <input
                    type="number"
                    id="qYear"
                    class="form-control"
                    placeholder="2024"
                    value="2024"
                    required
                  />
                </div>
              </div>

              <div class="two-col">
                <div class="form-group">
                  <label>Subject</label>
                  <input
                    type="text"
                    id="qSubject"
                    class="form-control"
                    placeholder="Physics"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Topic Category</label>
                  <input
                    type="text"
                    id="qTopic"
                    class="form-control"
                    placeholder="Thermodynamics"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label>Question Body</label>
                <textarea
                  id="qBody"
                  class="form-control"
                  placeholder="Enter the exact question..."
                  required
                ></textarea>
              </div>

              <div class="two-col">
                <div class="form-group">
                  <label>Correct Answer Key</label>
                  <input
                    type="text"
                    id="qAnswer"
                    class="form-control"
                    placeholder="A, B, C, or D"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Difficulty</label>
                  <input
                    type="number"
                    id="qDifficulty"
                    class="form-control"
                    min="1"
                    max="5"
                    value="1"
                    required
                  />
                </div>
              </div>

              <div class="two-col">
                <div class="form-group">
                  <label>Option A</label>
                  <input type="text" id="qOptionA" class="form-control" placeholder="First option" required />
                </div>
                <div class="form-group">
                  <label>Option B</label>
                  <input type="text" id="qOptionB" class="form-control" placeholder="Second option" required />
                </div>
              </div>

              <div class="two-col">
                <div class="form-group">
                  <label>Option C</label>
                  <input type="text" id="qOptionC" class="form-control" placeholder="Third option" required />
                </div>
                <div class="form-group">
                  <label>Option D</label>
                  <input type="text" id="qOptionD" class="form-control" placeholder="Fourth option" required />
                </div>
              </div>

              <div class="form-group">
                <label>Step-by-Step Explanation</label>
                <textarea
                  id="qExplanation"
                  class="form-control"
                  placeholder="Explain the solution..."
                ></textarea>
              </div>

              <button type="submit" class="btn" id="questionBtn">Inject into Database</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="alert"></div>
    <script type="module" src="/src/dashboard.js"></script>
  </body>
</html>
