<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PYQ Platform - Admin Portal</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="auth-container">
        <div class="auth-card glass-panel">
          <div class="auth-header">
            <svg
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="color: #818cf8; margin-bottom: 16px;"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            <h1>Admin Gateway</h1>
            <p style="color: var(--text-secondary); font-size: 14px;">
              Log in with your admin credentials to manage content and broadcasts.
            </p>
          </div>

          <form id="loginForm">
            <div class="form-group">
              <label for="apiBaseUrl">API Base URL</label>
              <input
                type="url"
                id="apiBaseUrl"
                class="form-control"
                placeholder="http://127.0.0.1:8000"
              />
              <p class="form-hint">
                Default localhost use hota hai. Agar backend alag host par ho to yahan change kar do.
              </p>
            </div>

            <div class="form-group">
              <label for="email">Admin Email</label>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="admin@admin.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Security Passphrase</label>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Enter your password"
                required
              />
            </div>

            <button type="submit" class="btn" id="loginBtn">Authenticate as Admin</button>
          </form>
        </div>
      </div>
    </div>

    <div id="toast" class="alert"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
